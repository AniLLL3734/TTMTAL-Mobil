<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Öğretmen Kaydı - TTMTAL Mobil</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" href="../app/src/main/res/drawable/ttmtal_logo.png">
</head>
<body class="dark-mode">
    <div id="register-screen" class="screen active" style="display: flex; justify-content: center; align-items: center; background: radial-gradient(circle at top right, #1e1b4b, #0f172a);">
        <div class="login-card">
            <img src="../app/src/main/res/drawable/ttmtal_logo.png" alt="Logo" class="login-logo" style="width: 100px; height: 100px; display: block; margin: 0 auto 20px; object-fit: contain;">
            <h1>Öğretmen Kaydı</h1>
            <p>Kaydınız admin onayından sonra aktifleşecektir.</p>
            <form id="register-form">
                <div class="input-group">
                    <input type="text" id="reg-name" placeholder="Ad Soyad" required>
                </div>
                <div class="input-group">
                    <input type="email" id="reg-email" placeholder="Kurumsal E-posta" required>
                </div>
                <div class="input-group">
                    <input type="password" id="reg-password" placeholder="Şifre" required>
                </div>
                <button type="button" id="btn-register" class="primary-btn">Kayıt Ol</button>
            </form>
            <div class="login-footer">
                <a href="index.html"><i class="fas fa-arrow-left"></i> Giriş Ekranına Dön</a>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import firebaseConfigLocal from "./firebase-config.js";

        const firebaseConfig = firebaseConfigLocal || {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            databaseURL: "https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.firebasestorage.app",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        document.getElementById('btn-register').onclick = async () => {
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-password').value;

            if(!name || !email || !pass) {
                alert('Lütfen tüm alanları doldurun.');
                return;
            }

            try {
                const res = await createUserWithEmailAndPassword(auth, email, pass);
                await set(ref(db, `teachers/${res.user.uid}`), { 
                    name, 
                    email, 
                    approved: false, 
                    timestamp: Date.now() 
                });
                alert('Kaydınız başarıyla alındı! Admin onayı sonrası giriş yapabilirsiniz.');
                window.location.href = 'index.html';
            } catch (e) {
                alert('Hata: ' + e.message);
            }
        };
    </script>
</body>
</html>
